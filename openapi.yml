openapi: 3.1.0
info:
  title: BALLDONTLIE
  version: 1.0.0
  description: |-
    API for accessing sports data across 25 sports.

    This is an index spec. For detailed schemas and endpoint documentation,
    use the per-sport specs linked below. Each is a self-contained OpenAPI 3.1 document.

    ## Per-Sport API Specs

    | Sport | Spec |
    |-------|------|
    | ATP Tennis | [openapi/atp.yml](https://www.balldontlie.io/openapi/atp.yml) |
    | Bundesliga | [openapi/bundesliga.yml](https://www.balldontlie.io/openapi/bundesliga.yml) |
    | CBB (College Baseball) | [openapi/cbb.yml](https://www.balldontlie.io/openapi/cbb.yml) |
    | CS2 (Counter-Strike) | [openapi/cs.yml](https://www.balldontlie.io/openapi/cs.yml) |
    | Dota 2 | [openapi/dota.yml](https://www.balldontlie.io/openapi/dota.yml) |
    | EPL (English Premier League) | [openapi/epl.yml](https://www.balldontlie.io/openapi/epl.yml) |
    | Formula 1 | [openapi/f1.yml](https://www.balldontlie.io/openapi/f1.yml) |
    | FIFA World Cup 2026 | [openapi/fifa.yml](https://www.balldontlie.io/openapi/fifa.yml) |
    | La Liga | [openapi/laliga.yml](https://www.balldontlie.io/openapi/laliga.yml) |
    | Ligue 1 | [openapi/ligue1.yml](https://www.balldontlie.io/openapi/ligue1.yml) |
    | League of Legends | [openapi/lol.yml](https://www.balldontlie.io/openapi/lol.yml) |
    | MLB | [openapi/mlb.yml](https://www.balldontlie.io/openapi/mlb.yml) |
    | MLS | [openapi/mls.yml](https://www.balldontlie.io/openapi/mls.yml) |
    | MMA | [openapi/mma.yml](https://www.balldontlie.io/openapi/mma.yml) |
    | NBA | [openapi/nba.yml](https://www.balldontlie.io/openapi/nba.yml) |
    | NCAAB (College Basketball) | [openapi/ncaab.yml](https://www.balldontlie.io/openapi/ncaab.yml) |
    | NCAAF (College Football) | [openapi/ncaaf.yml](https://www.balldontlie.io/openapi/ncaaf.yml) |
    | NCAAW (College Women's Basketball) | [openapi/ncaaw.yml](https://www.balldontlie.io/openapi/ncaaw.yml) |
    | NFL | [openapi/nfl.yml](https://www.balldontlie.io/openapi/nfl.yml) |
    | NHL | [openapi/nhl.yml](https://www.balldontlie.io/openapi/nhl.yml) |
    | PGA Tour | [openapi/pga.yml](https://www.balldontlie.io/openapi/pga.yml) |
    | Serie A | [openapi/seriea.yml](https://www.balldontlie.io/openapi/seriea.yml) |
    | UEFA Champions League | [openapi/ucl.yml](https://www.balldontlie.io/openapi/ucl.yml) |
    | WNBA | [openapi/wnba.yml](https://www.balldontlie.io/openapi/wnba.yml) |
    | WTA Tennis | [openapi/wta.yml](https://www.balldontlie.io/openapi/wta.yml) |
servers:
  - url: https://api.balldontlie.io
    description: Production server
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
security:
  - ApiKeyAuth: []
