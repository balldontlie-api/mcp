openapi: 3.1.0
info:
  title: BALLDONTLIE - NBA API
  version: 1.0.0
  description: NBA endpoints for the BallDontLie API.
servers:
  - url: https://api.balldontlie.io
    description: Production server
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
  schemas:
