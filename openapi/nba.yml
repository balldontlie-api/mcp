  /nba/v1/team_season_averages/{category}:
    get:
      summary: Get NBA team season averages by category
      description: |
        Retrieve team season averages for various statistical categories. Each category requires a specific type parameter
        that determines the exact stats returned. The hustle category does not require a type parameter.

        **Available category/type combinations:**
        - general: base, advanced, scoring, misc, opponent, defense, violations
        - clutch: base, advanced, misc, scoring
        - shooting: by_zone_base, by_zone_opponent, 5ft_range_base, 5ft_range_opponent
        - playtype: cut, handoff, isolation, offrebound, offscreen, postup, prballhandler, prrollman, spotup, transition, misc
        - tracking: painttouch, efficiency, speeddistance, defense, elbowtouch, posttouch, passing, drives, rebounding, catchshoot, pullupshot, possessions
        - hustle: (no type parameter required)
        - shotdashboard: overall, pullups, catch_and_shoot, less_than_10_ft
      tags:
        - NBA
      parameters:
        - name: category
          in: path
          required: true
          schema:
            type: string
            enum:
              - general
              - clutch
              - shooting
              - playtype
              - tracking
              - hustle
              - shotdashboard
          description: Statistical category
        - name: team_ids
          in: query
          required: false
          schema:
            type: array
            items:
              type: integer
          description: Filter by team IDs
        - name: season
          in: query
          required: true
          schema:
            type: integer
          description: Season year
        - name: season_type
          in: query
          required: true
          schema:
            type: string
            enum:
              - regular
              - playoffs
              - ist
          description: Season type
        - name: type
          in: query
          required: false
          schema:
            type: string
          description: Statistics type (required for all categories except hustle)
        - $ref: "#/components/parameters/CursorParam"
        - $ref: "#/components/parameters/PerPageParam"
      responses:
        "200":
          description: Team season averages by category
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/NBATeamSeasonStat"
                  meta:
                    $ref: "#/components/schemas/Pagination"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "429":
          $ref: "#/components/responses/RateLimitError"
        "500":
          $ref: "#/components/responses/ServerError"
