  /ncaab/v1/bracket:
    get:
      summary: Get NCAAB tournament bracket data
      tags:
        - NCAAB
      description: |
        Retrieve NCAA Men's Basketball tournament bracket data with optional filters (GOAT tier).
        Season values are offset by -1 from database values.

        Round IDs:
        - 1: First Four/Play-in games
        - 2: Round of 64 (First Round)
        - 3: Round of 32 (Second Round)
        - 4: Sweet 16 (Regional Semifinals)
        - 5: Elite 8 (Regional Finals)
        - 6: Final Four (National Semifinals)
        - 7: Championship (National Championship)
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/CursorParam"
        - $ref: "#/components/parameters/PerPageParam"
        - name: season
          in: query
          required: false
          schema:
            type: integer
          description: Filter by season (e.g. 2025 queries database for 2026)
        - name: round_id
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 7
          description: Filter by tournament round (1-7)
        - name: region_id
          in: query
          required: false
          schema:
            type: integer
          description: Filter by region ID
      responses:
        "200":
          description: NCAAB tournament bracket data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/NCAABBracket"
                  meta:
                    $ref: "#/components/schemas/Pagination"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "429":
          $ref: "#/components/responses/RateLimitError"
        "500":
          $ref: "#/components/responses/ServerError"
