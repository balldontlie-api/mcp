  /ncaaw/v1/bracket:
    get:
      summary: Get NCAAW tournament bracket data
      tags:
        - NCAAW
      description: |
        Retrieve NCAA Women's Basketball tournament bracket data with optional filters (GOAT tier).
        Season values are offset by -1 from database values.

        Round IDs:
        - 0: First Four/Play-in games
        - 1: Round of 64 (First Round)
        - 2: Round of 32 (Second Round)
        - 3: Sweet 16 (Regional Semifinals)
        - 4: Elite 8 (Regional Finals)
        - 5: Final Four (National Semifinals)
        - 6: Championship (National Championship)
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/CursorParam"
        - $ref: "#/components/parameters/PerPageParam"
        - name: season
          in: query
          required: false
          schema:
            type: integer
          description: Filter by season (e.g. 2025 queries database for 2026)
        - name: round_id
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            maximum: 6
          description: Filter by tournament round (0-6)
      responses:
        "200":
          description: NCAAW tournament bracket data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/NCAAWBracket"
                  meta:
                    $ref: "#/components/schemas/Pagination"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "429":
          $ref: "#/components/responses/RateLimitError"
        "500":
          $ref: "#/components/responses/ServerError"
  /ncaaw/v1/odds:
    get:
      summary: Get NCAAW betting odds
      description: Retrieve betting odds for NCAAW games. Either dates or game_ids is required. Note that NCAAW odds data is sparse — coverage is limited compared to other sports, and not all games will have odds available. Data is only available from the 2025-2026 season onwards.
      tags:
        - NCAAW
      parameters:
        - $ref: "#/components/parameters/CursorParam"
        - $ref: "#/components/parameters/PerPageParam"
        - name: dates
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
              format: date
          style: form
          explode: true
          description: Filter by game dates (YYYY-MM-DD format)
        - name: game_ids
          in: query
          required: false
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
          description: Filter by game IDs
      responses:
        "200":
