  /nfl/v1/odds/player_props:
    get:
      summary: Get NFL player prop betting odds
      description: |
        Retrieve live player prop betting data for NFL games. Player prop data is LIVE and updated in real-time.
        We do not store historical data. As games near completion, many (or all) player props may be removed from sportsbooks.

        **Note:** This endpoint returns all player props for the specified game in a single response. Pagination is not supported.

        The API supports two market types:
        - **over_under**: Traditional over/under markets where users can bet on whether a player will go over or under a specific line value
        - **milestone**: Milestone markets where users bet on whether a player will reach a specific achievement

        Available vendors: draftkings, betway, betrivers, ballybet, betparx (more coming soon!)
      tags:
        - NFL
      parameters:
        - name: game_id
          in: query
          required: true
          schema:
            type: integer
          description: The game ID to retrieve player props for (required)
        - name: player_id
          in: query
          required: false
          schema:
            type: integer
          description: Filter props for a specific player
        - name: prop_type
          in: query
          required: false
          schema:
            type: string
            enum:
              - anytime_td
              - anytime_td_1h
              - anytime_td_1q
              - anytime_td_2h
              - fg_made
              - fg_made_1h
              - first_td
              - interceptions
              - kicking_points
              - longest_pass
              - longest_reception
              - longest_rush
              - passing_attempts
              - passing_completions
              - passing_tds
              - passing_tds_1h
              - passing_yards
              - passing_yards_1h
              - receiving_yards
              - receiving_yards_1h
              - receptions
              - rushing_attempts
              - rushing_receiving_yards
              - rushing_yards
              - rushing_yards_1h
          description: Filter by prop type. Supported values include passing, rushing, receiving, touchdown, and kicking statistics.
        - name: vendors
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
          description: Filter by specific sportsbook vendors (e.g., draftkings, betrivers). If not provided, returns props from all available vendors.
      responses:
        "200":
          description: NFL player prop betting odds
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/NFLPlayerProp"
                  meta:
                    $ref: "#/components/schemas/PlayerPropMeta"
              example:
                data:
                  - id: 111967700
                    game_id: 424129
                    player_id: 490
                    vendor: betway
                    prop_type: rushing_yards
                    line_value: "85.5"
                    market:
                      type: over_under
                      over_odds: -115
                      under_odds: -110
                    updated_at: "2025-11-29T16:28:13.503Z"
                  - id: 112042232
                    game_id: 424129
                    player_id: 490
                    vendor: draftkings
                    prop_type: anytime_td
                    line_value: "0.5"
                    market:
                      type: milestone
                      odds: -250
                    updated_at: "2025-11-29T16:31:25.627Z"
                meta:
                  next_cursor: 112042641
                  per_page: 25
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "429":
          $ref: "#/components/responses/RateLimitError"
        "500":
          $ref: "#/components/responses/ServerError"
